[host_machine]
system = 'constanos'
cpu_family = 'x86_64'
cpu = 'x86_64'
endian = 'little'

[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar-20'
strip = 'llvm-strip-20'
objcopy = 'llvm-objcopy-20'

[built-in options]
c_args = ['--target=x86_64-constanos-elf', '-ffreestanding', '-fno-stack-protector', '-fomit-frame-pointer', '-mno-red-zone', '-D_GNU_SOURCE']
cpp_args = ['--target=x86_64-constanos-elf', '-ffreestanding', '-fno-stack-protector', '-fomit-frame-pointer', '-mno-red-zone', '-D_GNU_SOURCE']
c_link_args = ['--target=x86_64-constanos-elf', '-static', '-nostdlib']
cpp_link_args = ['--target=x86_64-constanos-elf', '-static', '-nostdlib']
